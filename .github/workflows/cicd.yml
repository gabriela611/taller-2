name: CICD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r "requirements.txt"

      - name: Test
        run: pytest test_integration_with_fake.py -v                                             

      - name: Build
        run: python app.py
